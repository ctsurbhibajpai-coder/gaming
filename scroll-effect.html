<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Scale Effect Template</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow-x: hidden;
            font-family: sans-serif;
        }

        .scroll-container {
            display: flex;
            flex-direction: column;
            gap: 100px;
            padding: 100px 0;
            width: 100%;
        }

        .section {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transform-origin: center center;
            will-change: transform;
        }

        .section h2 {
            font-size: 5rem;
            color: white;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* Initial state for all but first */
        .section:not(:first-child) {
            transform: scale(0.7);
        }

        /* Different Colors for Sections */
        .section-1 { background: #b20923; }
        .section-2 { background: #113038; }
        .section-3 { background: #4a148c; }
        .section-4 { background: #e65100; }
        .section-5 { background: #1b5e20; }
        .section-6 { background: #01579b; }
    </style>
</head>
<body>

    <div class="scroll-container">
        <div class="section section-1"><h2>Section 01</h2></div>
        <div class="section section-2"><h2>Section 02</h2></div>
        <div class="section section-3"><h2>Section 03</h2></div>
        <div class="section section-4"><h2>Section 04</h2></div>
        <div class="section section-5"><h2>Section 05</h2></div>
        <div class="section section-6"><h2>Section 06</h2></div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const sections = gsap.utils.toArray(".section");


        sections.forEach((section, i) => {
            // Set initial state
            gsap.set(section, { scale: i === 0 ? 1 : 0.7 });

            // Create a single timeline for the entire journey of the section
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: section,
                    start: "top bottom", // Starts when top enters bottom
                    end: "bottom top",    // Ends when bottom leaves top
                    scrub: true,
                    invalidateOnRefresh: true
                }
            });

            // Journey phase 1: Bottom of screen to Top of screen (Expansion)
            tl.to(section, { 
                scale: 1, 
                ease: "power1.inOut" 
            });

            // Journey phase 2: Top of screen to disappearing above (Shrinking)
            tl.to(section, { 
                scale: 0.7, 
                ease: "power1.inOut" 
            });
        });
    </script>
</body>
</html>
